services:
  node-daemon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: modelverse-node
    restart: unless-stopped
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - WALLET_ADDRESS=${WALLET_ADDRESS}
      - BACKEND_HTTP_URL=${BACKEND_HTTP_URL:-http://host.docker.internal:8000}
      - NODE_PRIVATE_KEY=${NODE_PRIVATE_KEY:-}
      - RPC_URL=${RPC_URL:-https://rpc-amoy.polygon.technology}
      - POLL_INTERVAL_SECONDS=${POLL_INTERVAL_SECONDS:-5}
      - HEARTBEAT_INTERVAL_SECONDS=${HEARTBEAT_INTERVAL_SECONDS:-30}
      - MODEL_CACHE_DIR=/app/models_cache
      - IPFS_GATEWAYS=https://ipfs.io/ipfs,https://cloudflare-ipfs.com/ipfs,https://gateway.pinata.cloud/ipfs
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - model_cache:/app/models_cache
      - node_logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python3", "-c", "import os; open('/app/.env')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  model_cache:
  node_logs: